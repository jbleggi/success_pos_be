# PostgreSQL database configuration for Active Record.
# Ensure the pg gem is installed and defined in your Gemfile:
# gem "pg"

default: &default
  adapter: postgresql
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: success_pos_be_development

test:
  <<: *default
  database: success_pos_be_test

production:
  primary:
    <<: *default
    database: success_pos_be_production
  cache:
    <<: *default
    database: success_pos_be_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: success_pos_be_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: success_pos_be_production_cable
    migrations_paths: db/cable_migrate